# Bench configuration

# --- Researcher profile ---
researcher:
  name: "Tianrun Hu"
  semantic_scholar_id: ""       # Fill in your own Semantic Scholar author ID
  google_scholar_id: ""         # Fill in your own Google Scholar author ID
  linkedin_url: ""              # Your LinkedIn profile URL (for opportunity matching)

# --- Paper tracking ---
papers:
  arxiv_categories:
    - cs.RO        # Robotics
    - cs.AI        # Artificial Intelligence
    - cs.LG        # Machine Learning
    - cs.CV        # Computer Vision
    - cs.CL        # Computation and Language (LLMs, reasoning)
    - cs.MA        # Multiagent Systems
  keywords:
    - reasoning
    - planning
    - task and motion planning
    - robot manipulation
    - robot learning
    - imitation learning
    - diffusion policy
    - foundation model
    - large language model
    - world model
    - sim-to-real
    - video generation
    - state representation
    - reinforcement learning
    - embodied AI
  max_results_per_category: 100
  prefilter_threshold: 5        # Stage 1: abstract-only pre-filter (sonnet, fast)
  relevance_threshold: 7        # Stage 2: after sonnet reads full paper
  max_papers_in_digest: 15
  max_papers_to_analyze: 5    # Deep delta analysis for top N papers
  auto_import_to_zotero: true
  zotero_collection: "Bench-Auto"


# --- Paths ---
paths:
  dropbox_data: "~/Dropbox/bench-data"

# --- Claude model ---
claude:
  model: "opus"               # opus, sonnet, or haiku

# --- Schedule ---
schedule:
  cron: "0 7 * * *"            # 7 AM daily
  timezone: "Asia/Singapore"

# --- Modules (enable/disable) ---
modules:
  papers: true
  intelligence: true
  news: true
  assistant: false       # Assistant runs separately via: uv run python src/assistant.py
  digest: true

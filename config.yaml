  # Daily recommended tasks (do if time allows)
  daily_habits:
    - "Read 1 paper deeply (30 min)"
    - "Review experiment logs / check running jobs"
    - "Write 1 paragraph of current paper draft"
    - "Exercise / take a walk (20 min)"

  # Email
  email_enabled: true
  email_max_items: 5            # Top N important emails to show

# --- Calendar ---
calendar:
  enabled: true
  calendar_ids:
    - primary

# --- Deadlines ---
